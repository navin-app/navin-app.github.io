<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAVIN - Social Impact Community</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>

:root{
    --blue:#0266FF;
    --yellow:#EFFB00;
    --black:#050505;
    --white:#F5F7FA;
    --dark-gray:#0E0E0E;
    --light-gray:#1A1A1A;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Space Grotesk',sans-serif;
    background:var(--black);
    color:white;
    overflow-x:hidden;
}

.app-container{
    display:flex;
    flex-direction:column;
    height:100vh;
    background:var(--black);
}

.topbar{
    position:sticky;
    top:0;
    z-index:50;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 24px;
    background:rgba(5,5,5,.95);
    backdrop-filter:blur(12px);
    border-bottom:2px solid rgba(239,251,0,.3);
}

.logo-nav{
    height:40px;
    display:flex;
    align-items:center;
}

.logo-nav img{
    height:40px;
    object-fit:contain;
}

.user-status{
    display:flex;
    gap:16px;
    align-items:center;
}

.coin-display{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(239,251,0,.1);
    border:1px solid rgba(239,251,0,.3);
    padding:8px 14px;
    border-radius:12px;
    font-size:13px;
    font-weight:700;
    color:var(--yellow);
}

.coin-display strong{
    font-size:18px;
}

.user-level{
    background:linear-gradient(135deg, #0266FF, #003EB5);
    padding:6px 12px;
    border-radius:8px;
    font-size:11px;
    font-weight:900;
    letter-spacing:1px;
    text-transform:uppercase;
}

.user-level.aoc{
    background:linear-gradient(135deg, #EFFB00, #CCB800);
    color:var(--black);
}

.main-content{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.content-area{
    flex:1;
    overflow-y:auto;
    padding:24px;
}

.tab-nav{
    display:flex;
    gap:8px;
    border-bottom:2px solid rgba(239,251,0,.2);
    background:rgba(5,5,5,.85);
    backdrop-filter:blur(12px);
    padding:0 24px;
}

.tab-btn{
    padding:16px 20px;
    background:none;
    border:none;
    color:rgba(255,255,255,.5);
    font-size:13px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    transition:all 0.3s ease;
    border-bottom:3px solid transparent;
}

.tab-btn:hover{
    color:white;
}

.tab-btn.active{
    color:var(--yellow);
    border-bottom-color:var(--yellow);
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
    animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}

.hero-banner{
    width:100%;
    height:280px;
    background:linear-gradient(135deg, #0266FF 0%, #003EB5 100%);
    border-radius:24px;
    padding:32px;
    margin-bottom:32px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    color:white;
    position:relative;
    overflow:hidden;
    background-size:cover;
    background-position:center;
    transition:background-image 0.6s ease;
}

.hero-banner::before{
    content:'';
    position:absolute;
    top:-50%;
    right:-10%;
    width:400px;
    height:400px;
    background:radial-gradient(circle, rgba(239,251,0,.1), transparent);
    border-radius:50%;
}

.hero-content{
    position:relative;
    z-index:2;
}

.hero-title{
    font-size:42px;
    font-weight:900;
    letter-spacing:-2px;
    margin-bottom:8px;
}

.hero-subtitle{
    font-size:14px;
    opacity:.9;
    margin-bottom:20px;
}

.hero-stats{
    display:flex;
    gap:32px;
}

.hero-stat{
    display:flex;
    flex-direction:column;
}

.hero-stat-label{
    font-size:11px;
    opacity:.7;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:4px;
}

.hero-stat-value{
    font-size:32px;
    font-weight:900;
    letter-spacing:-2px;
}

.feed-container{
    max-width:600px;
    margin:0 auto;
}

.post-card{
    background:var(--light-gray);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
    border:1px solid rgba(239,251,0,.2);
    transition:all 0.3s ease;
}

.post-card:hover{
    border-color:rgba(239,251,0,.4);
    background:var(--dark-gray);
}

.post-header{
    padding:16px 20px;
    display:flex;
    gap:12px;
    align-items:center;
    border-bottom:1px solid rgba(239,251,0,.1);
}

.post-avatar{
    width:44px;
    height:44px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--blue), var(--yellow));
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    font-size:18px;
}

.post-user-info h4{
    font-size:13px;
    font-weight:700;
    margin-bottom:2px;
}

.post-user-info p{
    font-size:11px;
    color:rgba(255,255,255,.6);
}

.post-image{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
}

.post-body{
    padding:16px 20px;
}

.post-text{
    font-size:14px;
    line-height:1.6;
    margin-bottom:12px;
}

.post-hashtags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:12px;
}

.post-hashtag{
    font-size:12px;
    color:var(--blue);
}

.post-stats{
    display:flex;
    gap:20px;
    padding:12px 0;
    border-top:1px solid rgba(239,251,0,.1);
    border-bottom:1px solid rgba(239,251,0,.1);
    font-size:12px;
}

.post-stat-item{
    display:flex;
    align-items:center;
    gap:4px;
}

.post-stat-item strong{
    color:var(--yellow);
}

.post-actions{
    display:flex;
    gap:12px;
    padding:12px 0;
}

.post-action-btn{
    flex:1;
    background:none;
    border:1px solid rgba(239,251,0,.3);
    color:white;
    padding:10px;
    border-radius:10px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    transition:all 0.3s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
}

.post-action-btn:hover{
    background:rgba(239,251,0,.1);
    border-color:rgba(239,251,0,.6);
}

.coin-badge{
    display:inline-block;
    background:rgba(239,251,0,.2);
    color:var(--yellow);
    padding:4px 10px;
    border-radius:6px;
    font-size:11px;
    font-weight:900;
}

.groups-container{
    max-width:800px;
    margin:0 auto;
}

.create-group-btn{
    width:100%;
    padding:16px;
    background:linear-gradient(135deg, var(--yellow), #CCBB00);
    border:none;
    border-radius:16px;
    color:var(--black);
    font-weight:900;
    font-size:14px;
    letter-spacing:1px;
    cursor:pointer;
    margin-bottom:24px;
    transition:all 0.3s ease;
}

.create-group-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 30px rgba(239,251,0,.2);
}

.group-card{
    background:var(--light-gray);
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
    border:1px solid rgba(239,251,0,.2);
    transition:all 0.3s ease;
}

.group-card:hover{
    border-color:rgba(239,251,0,.4);
}

.group-header{
    display:flex;
    justify-content:space-between;
    align-items:start;
    margin-bottom:12px;
}

.group-name{
    font-size:18px;
    font-weight:900;
}

.group-tag{
    background:rgba(239,251,0,.15);
    color:var(--yellow);
    padding:4px 10px;
    border-radius:6px;
    font-size:11px;
    font-weight:700;
}

.group-info{
    font-size:13px;
    color:rgba(255,255,255,.7);
    margin-bottom:12px;
}

.group-members{
    display:flex;
    gap:8px;
    margin-bottom:12px;
    flex-wrap:wrap;
}

.member-avatar{
    width:32px;
    height:32px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--blue), var(--yellow));
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
}

.group-actions{
    display:flex;
    gap:10px;
}

.group-btn{
    flex:1;
    padding:10px;
    background:rgba(2,102,255,.1);
    border:1px solid rgba(2,102,255,.3);
    color:var(--blue);
    border-radius:10px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    transition:all 0.3s ease;
}

.group-btn:hover{
    background:rgba(2,102,255,.2);
}

.chat-container{
    display:flex;
    gap:16px;
    max-width:900px;
    margin:0 auto;
    height:500px;
}

.chat-list{
    flex:0 0 280px;
    background:var(--light-gray);
    border-radius:16px;
    overflow-y:auto;
}

.chat-item{
    padding:12px;
    border-bottom:1px solid rgba(239,251,0,.1);
    cursor:pointer;
    transition:all 0.3s ease;
}

.chat-item:hover{
    background:var(--dark-gray);
}

.chat-item.active{
    background:rgba(2,102,255,.15);
    border-left:3px solid var(--blue);
}

.chat-item-header{
    display:flex;
    gap:8px;
    align-items:center;
    margin-bottom:4px;
}

.chat-item-avatar{
    width:36px;
    height:36px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--blue), var(--yellow));
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
}

.chat-item-name{
    font-size:13px;
    font-weight:700;
}

.chat-item-preview{
    font-size:12px;
    color:rgba(255,255,255,.5);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.chat-window{
    flex:1;
    background:var(--light-gray);
    border-radius:16px;
    display:flex;
    flex-direction:column;
}

.chat-header{
    padding:16px;
    border-bottom:1px solid rgba(239,251,0,.2);
}

.chat-header h3{
    font-size:16px;
    font-weight:700;
}

.chat-messages{
    flex:1;
    overflow-y:auto;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.message{
    display:flex;
    gap:8px;
    margin-bottom:8px;
}

.message.sent{
    justify-content:flex-end;
}

.message-bubble{
    max-width:70%;
    padding:10px 14px;
    border-radius:12px;
    font-size:13px;
    line-height:1.5;
}

.message.received .message-bubble{
    background:rgba(2,102,255,.15);
    color:white;
}

.message.sent .message-bubble{
    background:var(--blue);
    color:white;
}

.chat-input-area{
    padding:16px;
    border-top:1px solid rgba(239,251,0,.2);
    display:flex;
    gap:10px;
}

.chat-input{
    flex:1;
    background:var(--dark-gray);
    border:1px solid rgba(239,251,0,.2);
    border-radius:10px;
    padding:10px 12px;
    color:white;
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
}

.chat-input::placeholder{
    color:rgba(255,255,255,.4);
}

.chat-send-btn{
    background:var(--yellow);
    color:var(--black);
    border:none;
    border-radius:10px;
    width:44px;
    height:44px;
    font-size:18px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    transition:all 0.3s ease;
}

.chat-send-btn:hover{
    background:#FFFF33;
}

.profile-container{
    max-width:600px;
    margin:0 auto;
}

.profile-header{
    background:linear-gradient(135deg, #0266FF 0%, #003EB5 100%);
    border-radius:16px;
    padding:32px;
    margin-bottom:24px;
    text-align:center;
    color:white;
    position:relative;
    overflow:hidden;
}

.profile-avatar{
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(255,255,255,.2);
    margin:0 auto 16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    font-weight:900;
}

.profile-name{
    font-size:28px;
    font-weight:900;
    margin-bottom:8px;
    letter-spacing:-1px;
}

.profile-level{
    display:inline-block;
    background:rgba(255,255,255,.2);
    padding:6px 12px;
    border-radius:8px;
    font-size:12px;
    font-weight:900;
    margin-bottom:16px;
}

.profile-stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:12px;
    padding:16px;
    background:rgba(255,255,255,.1);
    border-radius:12px;
}

.profile-stat{
    text-align:center;
}

.profile-stat-number{
    font-size:28px;
    font-weight:900;
    color:var(--yellow);
    margin-bottom:4px;
}

.profile-stat-label{
    font-size:11px;
    opacity:.8;
    text-transform:uppercase;
}

.profile-section{
    background:var(--light-gray);
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
    border:1px solid rgba(239,251,0,.2);
}

.profile-section-title{
    font-size:14px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:16px;
    color:var(--yellow);
}

.profile-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid rgba(239,251,0,.1);
}

.profile-item:last-child{
    border-bottom:none;
}

.profile-item-label{
    font-size:13px;
    color:rgba(255,255,255,.7);
}

.profile-item-value{
    font-size:14px;
    font-weight:700;
}

.edit-btn, .logout-btn{
    width:100%;
    padding:12px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    color:white;
    font-weight:700;
    cursor:pointer;
    margin-bottom:12px;
    transition:all 0.3s ease;
}

.logout-btn{
    background:#CC0000;
}

.edit-btn:hover{
    background:#0052CC;
}

.logout-btn:hover{
    background:#990000;
}

.hydration-progress{
    width:100%;
    height:12px;
    background:rgba(255,255,255,.1);
    border-radius:6px;
    overflow:hidden;
    margin-top:8px;
}

.hydration-progress-bar{
    height:100%;
    background:linear-gradient(90deg, #00D9FF, var(--blue));
    transition:width 0.3s ease;
}

.upload-section{
    background:var(--light-gray);
    border-radius:16px;
    padding:20px;
    margin-bottom:24px;
    border:1px solid rgba(239,251,0,.2);
}

.upload-label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--yellow);
    margin-bottom:12px;
    text-transform:uppercase;
}

.upload-input{
    width:100%;
    padding:12px;
    background:var(--dark-gray);
    border:1px solid rgba(239,251,0,.3);
    border-radius:10px;
    color:white;
    margin-bottom:12px;
    font-family:'Space Grotesk',sans-serif;
}

.upload-btn{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg, var(--blue), #003EB5);
    border:none;
    border-radius:10px;
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:all 0.3s ease;
}

.upload-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(2,102,255,.3);
}

.auth-container{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    background:var(--black);
}

.auth-card{
    background:var(--light-gray);
    border-radius:20px;
    padding:40px;
    border:1px solid rgba(239,251,0,.2);
    max-width:400px;
    width:90%;
}

.auth-title{
    font-size:32px;
    font-weight:900;
    margin-bottom:24px;
    text-align:center;
    color:var(--yellow);
}

.auth-input{
    width:100%;
    padding:12px;
    background:var(--dark-gray);
    border:1px solid rgba(239,251,0,.3);
    border-radius:10px;
    color:white;
    margin-bottom:16px;
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
}

.auth-input::placeholder{
    color:rgba(255,255,255,.4);
}

.auth-btn{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg, var(--blue), #003EB5);
    border:none;
    border-radius:10px;
    color:white;
    font-weight:700;
    cursor:pointer;
    margin-bottom:12px;
    transition:all 0.3s ease;
}

.auth-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(2,102,255,.3);
}

.auth-toggle{
    text-align:center;
    font-size:13px;
    color:rgba(255,255,255,.7);
}

.auth-toggle a{
    color:var(--yellow);
    cursor:pointer;
    font-weight:700;
}

.loading{
    text-align:center;
    padding:40px;
    font-size:14px;
    color:rgba(255,255,255,.7);
}

@media(max-width:768px){
    .hero-stats{
        flex-wrap:wrap;
        gap:20px;
    }

    .chat-container{
        flex-direction:column;
        height:auto;
    }

    .chat-list{
        flex:0 0 auto;
    }

    .topbar{
        flex-wrap:wrap;
        gap:12px;
    }

    .user-status{
        width:100%;
        flex-wrap:wrap;
    }
}

</style>
</head>

<body>

<div class="app-container" id="app">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="logo-nav">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='70' font-size='60' font-weight='900' fill='%23EFFB00' text-anchor='middle'%3ENAVIN%3C/text%3E%3C/svg%3E" alt="NAVIN" style="height:40px;">
        </div>
        <div class="user-status">
            <div class="coin-display">
                💰 <strong id="coinDisplay">0</strong> Coins
            </div>
            <div class="user-level" id="levelDisplay">Movers</div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- TAB NAVIGATION -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('home')">🏠 Home</button>
            <button class="tab-btn" onclick="switchTab('groups')">👥 Groups</button>
            <button class="tab-btn" onclick="switchTab('chat')">💬 Chat</button>
            <button class="tab-btn" onclick="switchTab('profile')">👤 Profile</button>
        </div>

        <!-- CONTENT AREA -->
        <div class="content-area">

            <!-- HOME TAB -->
            <div id="home" class="tab-content active">
                <div class="hero-banner" id="heroBanner">
                    <div class="hero-content">
                        <div class="hero-title">Hydration Impact</div>
                        <div class="hero-subtitle">📸 Share Your NAVIN Moment & Earn Coins</div>
                    </div>
                    <div class="hero-stats">
                        <div class="hero-stat">
                            <div class="hero-stat-label">This Month</div>
                            <div class="hero-stat-value" id="hydrationMonth">0L</div>
                        </div>
                        <div class="hero-stat">
                            <div class="hero-stat-label">Target Daily</div>
                            <div class="hero-stat-value">1.0L</div>
                        </div>
                        <div class="hero-stat">
                            <div class="hero-stat-label">Photos</div>
                            <div class="hero-stat-value" id="photoCount">0</div>
                        </div>
                    </div>
                </div>

                <div class="upload-section">
                    <label class="upload-label">Share Your Moment</label>
                    <input type="file" id="photoInput" class="upload-input" accept="image/*" placeholder="Choose photo">
                    <input type="text" id="captionInput" class="upload-input" placeholder="Write caption...">
                    <button class="upload-btn" onclick="uploadPost()">📸 Post Now</button>
                </div>

                <div class="feed-container" id="feedContainer">
                    <div class="loading">Loading posts...</div>
                </div>
            </div>

            <!-- GROUPS TAB -->
            <div id="groups" class="tab-content">
                <div class="groups-container">
                    <button class="create-group-btn" onclick="createGroupPrompt()">➕ Create New Group</button>
                    <div id="groupsList"></div>
                </div>
            </div>

            <!-- CHAT TAB -->
            <div id="chat" class="tab-content">
                <div class="chat-container">
                    <div class="chat-list" id="chatList"></div>
                    <div class="chat-window">
                        <div class="chat-header">
                            <h3 id="chatFriendName">Select a friend</h3>
                        </div>
                        <div class="chat-messages" id="chatMessages"></div>
                        <div class="chat-input-area">
                            <input type="text" class="chat-input" id="chatInput" placeholder="Type message...">
                            <button class="chat-send-btn" onclick="sendMessage()">➤</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PROFILE TAB -->
            <div id="profile" class="tab-content">
                <div class="profile-container">
                    <div class="profile-header">
                        <div class="profile-avatar" id="profileAvatar">U</div>
                        <div class="profile-name" id="profileName">User</div>
                        <div class="profile-level" id="profileLevel">Movers</div>
                        <div class="profile-stats">
                            <div class="profile-stat">
                                <div class="profile-stat-number" id="profileCoins">0</div>
                                <div class="profile-stat-label">Coins</div>
                            </div>
                            <div class="profile-stat">
                                <div class="profile-stat-number" id="profileHydration">0</div>
                                <div class="profile-stat-label">Hydration (L)</div>
                            </div>
                            <div class="profile-stat">
                                <div class="profile-stat-number" id="profileFriends">0</div>
                                <div class="profile-stat-label">Friends</div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-section">
                        <div class="profile-section-title">Hydration Goal</div>
                        <div class="profile-item">
                            <span class="profile-item-label">Daily Progress</span>
                            <span class="profile-item-value" id="dailyProgress">0%</span>
                        </div>
                        <div class="hydration-progress">
                            <div class="hydration-progress-bar" id="hydrationBar" style="width:0%"></div>
                        </div>
                        <input type="number" id="hydrationInput" class="upload-input" placeholder="Add hydration (ml)" style="margin-top:12px;">
                        <button class="upload-btn" onclick="addHydration()" style="margin-top:8px;">💧 Log Hydration</button>
                    </div>

                    <div class="profile-section">
                        <div class="profile-section-title">Friends</div>
                        <div id="friendsList"></div>
                        <input type="text" id="friendInput" class="upload-input" placeholder="Enter friend User ID..." style="margin-top:12px;">
                        <button class="upload-btn" onclick="addFriendById()" style="margin-top:8px;">👥 Add Friend</button>
                    </div>

                    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
                </div>
            </div>

        </div>

    </div>

</div>

<script>

// ⚠️ TEMPORARY: Mock API sampai Google Apps Script ready
// Ganti dengan real API_BASE saat backend siap:
// const API_BASE = 'https://script.google.com/macros/d/14iGYjHSkeWS37k5vxFYZ75iqBd8lDfgVXNKfSsJGfBYoc2YMY4QdqeyG/userweb';

const API_BASE = null; // Will use Mock Backend
const HERO_IMAGES = [
    'url(data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 600 400%27%3E%3Crect fill=%27%230266FF%27 width=%27600%27 height=%27400%27/%3E%3Ctext x=%27300%27 y=%27200%27 font-size=%2760%27 fill=%27%23EFFB00%27 text-anchor=%27middle%27 dominant-baseline=%27middle%27%3E🚴 Cycling Day%3C/text%3E%3C/svg%3E)',
    'url(data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 600 400%27%3E%3Crect fill=%27%23003EB5%27 width=%27600%27 height=%27400%27/%3E%3Ctext x=%27300%27 y=%27200%27 font-size=%2760%27 fill=%27%23EFFB00%27 text-anchor=%27middle%27 dominant-baseline=%27middle%27%3E💧 Hydration Goal%3C/text%3E%3C/svg%3E)',
    'url(data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 600 400%27%3E%3Crect fill=%270266FF%27 width=%27600%27 height=%27400%27/%3E%3Ctext x=%27300%27 y=%27200%27 font-size=%2760%27 fill=%27%23EFFB00%27 text-anchor=%27middle%27 dominant-baseline=%27middle%27%3E🌍 Carbon Saved%3C/text%3E%3C/svg%3E)',
    'url(data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 600 400%27%3E%3Crect fill=%23003EB5%27 width=%27600%27 height=%27400%27/%3E%3Ctext x=%27300%27 y=%27200%27 font-size=%2760%27 fill=%27%23EFFB00%27 text-anchor=%27middle%27 dominant-baseline=%27middle%27%3E🏆 Impact%3C/text%3E%3C/svg%3E)'
];

let currentUser = null;
let currentImageIndex = 0;
let friends = [];
let chatFriends = [];
let selectedChatFriend = null;

// ─── INIT ───────────────────────────────────────────────────
function init() {
    const token = localStorage.getItem('token');
    const userId = localStorage.getItem('userId');

    if (!token || !userId) {
        showAuthUI();
    } else {
        currentUser = { token, userId };
        loadApp();
    }
}

function showAuthUI() {
    document.getElementById('app').innerHTML = `
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-title">NAVIN</div>
                <div id="authForm">
                    <h3 style="margin-bottom:20px;">Login</h3>
                    <input type="email" id="email" class="auth-input" placeholder="Email" required>
                    <input type="password" id="password" class="auth-input" placeholder="Password" required>
                    <button class="auth-btn" onclick="login()">Login</button>
                    <div class="auth-toggle">
                        Don't have account? <a onclick="toggleAuthMode()">Sign Up</a>
                    </div>
                </div>
            </div>
        </div>
    `;
}

function toggleAuthMode() {
    const form = document.getElementById('authForm');
    if (form.innerHTML.includes('Login')) {
        form.innerHTML = `
            <h3 style="margin-bottom:20px;">Sign Up</h3>
            <input type="text" id="name" class="auth-input" placeholder="Full Name" required>
            <input type="email" id="email" class="auth-input" placeholder="Email" required>
            <input type="password" id="password" class="auth-input" placeholder="Password" required>
            <button class="auth-btn" onclick="signup()">Sign Up</button>
            <div class="auth-toggle">
                Already have account? <a onclick="toggleAuthMode()">Login</a>
            </div>
        `;
    } else {
        toggleAuthMode.call({ innerHTML: 'Login' });
        showAuthUI();
    }
}

function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    fetch(API_BASE + '?payload=' + encodeURIComponent(JSON.stringify({
        action: 'login',
        email,
        password
    }))).then(r => r.json()).then(data => {
        if (data.success) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('userId', data.userId);
            currentUser = { token: data.token, userId: data.userId };
            loadApp();
        } else {
            alert(data.message);
        }
    });
}

function signup() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    fetch(API_BASE + '?payload=' + encodeURIComponent(JSON.stringify({
        action: 'signup',
        name,
        email,
        password
    }))).then(r => r.json()).then(data => {
        if (data.success) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('userId', data.userId);
            currentUser = { token: data.token, userId: data.userId };
            loadApp();
        } else {
            alert(data.message);
        }
    });
}

function logout() {
    localStorage.clear();
    location.reload();
}

function loadApp() {
    loadProfile();
    loadFeed();
    loadFriends();
    loadChatFriends();
    loadGroups();
    startHeroImageRotation();
    setInterval(refresh, 60000);
}

function startHeroImageRotation() {
    const banner = document.getElementById('heroBanner');
    setInterval(() => {
        currentImageIndex = (currentImageIndex + 1) % HERO_IMAGES.length;
        banner.style.backgroundImage = HERO_IMAGES[currentImageIndex];
    }, 3000);
    banner.style.backgroundImage = HERO_IMAGES[0];
}

// ─── MOCK API (localStorage) ───────────────────────────────
function mockApiCall(action, data = {}) {
    const db = {
        users: JSON.parse(localStorage.getItem('navin_users') || '[]'),
        posts: JSON.parse(localStorage.getItem('navin_posts') || '[]'),
        friends: JSON.parse(localStorage.getItem('navin_friends') || '[]'),
    };

    if (action === 'signup') {
        const { email, password, name } = data;
        if (db.users.find(u => u.email === email)) return { success: false, message: 'Email sudah terdaftar.' };
        const userId = 'USR_' + Math.random().toString(36).substr(2, 8).toUpperCase();
        const user = { userId, email, password, name, joinDate: new Date().toISOString(), level: 'Movers', coins: 0, totalHydration_L: 0 };
        db.users.push(user);
        localStorage.setItem('navin_users', JSON.stringify(db.users));
        const token = btoa(userId + ':' + Math.random());
        return { success: true, token, userId, name, email };
    }

    if (action === 'login') {
        const { email, password } = data;
        const user = db.users.find(u => u.email === email && u.password === password);
        if (!user) return { success: false, message: 'Email atau password salah.' };
        const token = btoa(user.userId + ':' + Math.random());
        return { success: true, token, userId: user.userId, name: user.name, email: user.email, level: user.level, coins: user.coins };
    }

    if (action === 'getMyProfile') {
        const user = db.users.find(u => u.userId === currentUser.userId);
        if (!user) return { success: false, message: 'User tidak ditemukan.' };
        return { success: true, profile: user };
    }

    if (action === 'uploadPost') {
        const post = { postId: 'POST_' + Date.now(), userId: currentUser.userId, caption: data.caption, photoBase64: data.photoBase64, timestamp: new Date().toISOString(), likes_count: 0, coins_earned: 20, name: '' };
        const user = db.users.find(u => u.userId === currentUser.userId);
        if (user) { post.name = user.name; user.coins = (user.coins || 0) + 20; }
        db.posts.push(post);
        db.users = db.users.map(u => u.userId === currentUser.userId ? { ...u, coins: user.coins } : u);
        localStorage.setItem('navin_posts', JSON.stringify(db.posts));
        localStorage.setItem('navin_users', JSON.stringify(db.users));
        return { success: true, message: 'Post berhasil dibuat! +20 coins', postId: post.postId };
    }

    if (action === 'getFeed') {
        const friendIds = db.friends.filter(f => f.userId === currentUser.userId && f.status === 'accepted').map(f => f.friendId);
        friendIds.push(currentUser.userId);
        const feed = db.posts.filter(p => friendIds.includes(p.userId)).reverse().slice(0, 50);
        return { success: true, feed };
    }

    if (action === 'likePost') {
        const post = db.posts.find(p => p.postId === data.postId);
        if (post) {
            post.likes_count = (post.likes_count || 0) + 1;
            const author = db.users.find(u => u.userId === post.userId);
            if (author) author.coins = (author.coins || 0) + 1;
            localStorage.setItem('navin_posts', JSON.stringify(db.posts));
            localStorage.setItem('navin_users', JSON.stringify(db.users));
        }
        return { success: true, message: 'Post dilike! +1 coin untuk author' };
    }

    if (action === 'getMyFriends') {
        const friends = db.friends.filter(f => f.userId === currentUser.userId && f.status === 'accepted').map(f => {
            const friend = db.users.find(u => u.userId === f.friendId);
            return { friendId: f.friendId, name: friend?.name || 'Unknown', email: friend?.email || '', level: friend?.level || 'Movers' };
        });
        return { success: true, friends };
    }

    if (action === 'addFriendByUserId') {
        const friend = db.users.find(u => u.userId === data.friendUserId);
        if (!friend) return { success: false, message: 'User tidak ditemukan.' };
        if (db.friends.some(f => (f.userId === currentUser.userId && f.friendId === data.friendUserId) || (f.userId === data.friendUserId && f.friendId === currentUser.userId))) return { success: false, message: 'Sudah berteman.' };
        db.friends.push({ userId: currentUser.userId, friendId: data.friendUserId, status: 'accepted', createdAt: new Date().toISOString() });
        db.friends.push({ userId: data.friendUserId, friendId: currentUser.userId, status: 'accepted', createdAt: new Date().toISOString() });
        localStorage.setItem('navin_friends', JSON.stringify(db.friends));
        return { success: true, message: 'Teman ditambahkan: ' + friend.name };
    }

    if (action === 'updateHydration') {
        const user = db.users.find(u => u.userId === currentUser.userId);
        if (user) {
            user.totalHydration_L = (user.totalHydration_L || 0) + (data.hydration_ml / 1000);
            if (user.totalHydration_L >= 1 && (user.totalHydration_L - data.hydration_ml / 1000) < 1) {
                user.coins = (user.coins || 0) + 5;
            }
            localStorage.setItem('navin_users', JSON.stringify(db.users));
        }
        return { success: true, message: 'Hydration updated!', totalHydration: Math.round(user.totalHydration_L * 100) / 100, coinsBonus: 5 };
    }

    if (action === 'getGroups') {
        return { success: true, groups: [], canCreate: true };
    }

    return { success: false, message: 'Unknown action' };
}

// ─── API CALLS ───────────────────────────────────────────────
function apiCall(action, data = {}) {
    if (!API_BASE) {
        return Promise.resolve(mockApiCall(action, data));
    }
    return fetch(API_BASE + '?payload=' + encodeURIComponent(JSON.stringify({
        action,
        token: currentUser.token,
        userId: currentUser.userId,
        ...data
    }))).then(r => r.json());
}

function loadProfile() {
    apiCall('getMyProfile').then(data => {
        if (data.success) {
            const p = data.profile;
            document.getElementById('coinDisplay').textContent = Math.round(p.coins || 0);
            document.getElementById('levelDisplay').textContent = p.level;
            document.getElementById('profileName').textContent = p.name;
            document.getElementById('profileAvatar').textContent = p.name.charAt(0).toUpperCase();
            document.getElementById('profileLevel').textContent = p.level;
            document.getElementById('profileCoins').textContent = Math.round(p.coins || 0);
            document.getElementById('profileHydration').textContent = Math.round((p.totalHydration_L || 0) * 10) / 10;
            document.getElementById('hydrationMonth').textContent = Math.round((p.totalHydration_L || 0) * 10) / 10 + 'L';
            document.getElementById('levelDisplay').classList.toggle('aoc', p.level === 'Agent Of Change');
        }
    });
}

function loadFeed() {
    apiCall('getFeed').then(data => {
        if (data.success) {
            const container = document.getElementById('feedContainer');
            if (!data.feed || data.feed.length === 0) {
                container.innerHTML = '<div class="loading">No posts yet. Be the first to post!</div>';
                return;
            }
            container.innerHTML = data.feed.map(post => `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-avatar">${post.name.charAt(0).toUpperCase()}</div>
                        <div class="post-user-info">
                            <h4>${post.name}</h4>
                            <p>${new Date(post.timestamp).toLocaleDateString()}</p>
                        </div>
                    </div>
                    ${post.photoBase64 ? `<img src="${post.photoBase64}" class="post-image">` : ''}
                    <div class="post-body">
                        <div class="post-text">${post.caption || ''}</div>
                        <div class="post-stats">
                            <div class="post-stat-item">👍 <strong>${post.likes_count || 0}</strong> Likes</div>
                            <div class="post-stat-item coin-badge">+${post.coins_earned || 20} Coins</div>
                        </div>
                        <div class="post-actions">
                            <button class="post-action-btn" onclick="likePost('${post.postId}')">👍 Like</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    });
}

function uploadPost() {
    const caption = document.getElementById('captionInput').value;
    const photoInput = document.getElementById('photoInput');

    if (!caption && !photoInput.files[0]) {
        alert('Add caption or photo!');
        return;
    }

    if (photoInput.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            apiCall('uploadPost', {
                caption,
                photoBase64: e.target.result.substring(0, 1000)
            }).then(data => {
                if (data.success) {
                    document.getElementById('captionInput').value = '';
                    photoInput.value = '';
                    loadFeed();
                    loadProfile();
                }
            });
        };
        reader.readAsDataURL(photoInput.files[0]);
    } else {
        apiCall('uploadPost', { caption }).then(data => {
            if (data.success) {
                document.getElementById('captionInput').value = '';
                loadFeed();
                loadProfile();
            }
        });
    }
}

function likePost(postId) {
    apiCall('likePost', { postId }).then(() => {
        loadFeed();
        loadProfile();
    });
}

function loadFriends() {
    apiCall('getMyFriends').then(data => {
        if (data.success) {
            friends = data.friends || [];
            document.getElementById('profileFriends').textContent = friends.length;
            const list = document.getElementById('friendsList');
            if (friends.length === 0) {
                list.innerHTML = '<div class="profile-item"><span>No friends yet</span></div>';
            } else {
                list.innerHTML = friends.map(f => `
                    <div class="profile-item">
                        <span class="profile-item-label">${f.name}</span>
                        <span class="profile-item-value">${f.level}</span>
                    </div>
                `).join('');
            }
        }
    });
}

function addFriendById() {
    const id = document.getElementById('friendInput').value.trim();
    if (!id) return alert('Enter friend ID!');

    apiCall('addFriendByUserId', { friendUserId: id }).then(data => {
        if (data.success) {
            alert(data.message);
            document.getElementById('friendInput').value = '';
            loadFriends();
        } else {
            alert(data.message);
        }
    });
}

function addHydration() {
    const ml = parseInt(document.getElementById('hydrationInput').value);
    if (!ml || ml <= 0) return alert('Enter valid hydration!');

    apiCall('updateHydration', { hydration_ml: ml }).then(data => {
        if (data.success) {
            document.getElementById('hydrationInput').value = '';
            loadProfile();
        }
    });
}

function loadChatFriends() {
    apiCall('getMyFriends').then(data => {
        if (data.success) {
            chatFriends = data.friends || [];
            const list = document.getElementById('chatList');
            list.innerHTML = chatFriends.map((f, i) => `
                <div class="chat-item ${i === 0 ? 'active' : ''}" onclick="selectChatFriend(${i}, '${f.friendId}', '${f.name}')">
                    <div class="chat-item-header">
                        <div class="chat-item-avatar">${f.name.charAt(0)}</div>
                        <div class="chat-item-name">${f.name}</div>
                    </div>
                    <div class="chat-item-preview">Click to chat</div>
                </div>
            `).join('');
            if (chatFriends.length > 0) {
                selectChatFriend(0, chatFriends[0].friendId, chatFriends[0].name);
            }
        }
    });
}

function selectChatFriend(index, friendId, name) {
    selectedChatFriend = { friendId, name };
    document.querySelectorAll('.chat-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
    });
    document.getElementById('chatFriendName').textContent = name;
    document.getElementById('chatMessages').innerHTML = `
        <div class="message received">
            <div class="message-bubble">Hey! 👋</div>
        </div>
    `;
}

function sendMessage() {
    if (!selectedChatFriend) return;
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    const messages = document.getElementById('chatMessages');
    messages.innerHTML += `
        <div class="message sent">
            <div class="message-bubble">${text}</div>
        </div>
    `;
    input.value = '';
    messages.scrollTop = messages.scrollHeight;
}

function loadGroups() {
    apiCall('getGroups').then(data => {
        if (data.success) {
            const container = document.getElementById('groupsList');
            if (!data.groups || data.groups.length === 0) {
                container.innerHTML = '<div class="loading">No groups yet</div>';
            } else {
                container.innerHTML = data.groups.map(g => `
                    <div class="group-card">
                        <div class="group-header">
                            <div class="group-name">${g.name}</div>
                            <div class="group-tag">Members: ${g.members.length}</div>
                        </div>
                        <div class="group-actions">
                            <button class="group-btn">Join</button>
                        </div>
                    </div>
                `).join('');
            }
        }
    });
}

function createGroupPrompt() {
    const name = prompt('Group name:');
    if (!name) return;

    apiCall('createGroup', { groupName: name }).then(data => {
        if (data.success) {
            loadGroups();
        } else {
            alert(data.message);
        }
    });
}

function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');
}

function refresh() {
    loadProfile();
    loadFeed();
}

init();

</script>

</body>
</html>

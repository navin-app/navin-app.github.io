<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAVIN Social — Personal Carbon Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #0266FF;
      --yellow: #EFFB00;
      --black: #050505;
      --white: #F5F7FA;
      --green: #00C853;
      --red: #FF3B30;
      --gray: #1A1A1A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--black);
      color: white;
      overflow-x: hidden;
    }

    .auth-gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-gate.hidden { display: none; }

    .auth-box {
      width: 100%;
      max-width: 480px;
      margin: 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid rgba(239, 251, 0, 0.3);
      border-radius: 28px;
      padding: 32px 28px;
    }

    .auth-title { font-size: 44px; font-weight: 900; margin-bottom: 12px; }
    .auth-sub { font-size: 13px; opacity: 0.6; margin-bottom: 20px; }

    .auth-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(239, 251, 0, 0.15);
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .auth-btn {
      width: 100%;
      padding: 14px;
      background: var(--yellow);
      color: var(--black);
      border: none;
      border-radius: 12px;
      font-weight: 900;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      margin-top: 10px;
    }

    .auth-btn:hover { background: #d4de00; }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      min-height: 100vh;
    }

    .sidebar, .right-sidebar {
      background: rgba(5, 5, 5, 0.95);
      border: 2px solid rgba(239, 251, 0, 0.15);
      padding: 20px;
      max-height: 100vh;
      overflow-y: auto;
    }

    .logo { font-size: 28px; font-weight: 900; color: var(--yellow); margin-bottom: 24px; }

    .menu-btn {
      width: 100%;
      padding: 12px;
      background: rgba(239, 251, 0, 0.1);
      border: 2px solid rgba(239, 251, 0, 0.2);
      color: white;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 13px;
    }

    .menu-btn.active, .menu-btn:hover { background: var(--yellow); color: var(--black); }

    .main {
      padding: 24px;
      overflow-y: auto;
      background: radial-gradient(circle at top, rgba(239,251,0,.05), transparent 30%);
    }

    .page { display: none; }
    .page.active { display: block; }

    .post {
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid rgba(239, 251, 0, 0.15);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .post-author { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
    .post-caption { font-size: 13px; line-height: 1.5; margin-bottom: 10px; }
    .post-actions { display: flex; gap: 8px; }
    .post-btn { flex: 1; padding: 8px; background: rgba(239, 251, 0, 0.1); border: 1px solid rgba(239, 251, 0, 0.2); color: var(--yellow); border-radius: 6px; cursor: pointer; font-size: 12px; }

    .stat-box {
      background: rgba(239, 251, 0, 0.08);
      border: 2px solid rgba(239, 251, 0, 0.2);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      text-align: center;
    }

    .stat-label { font-size: 10px; color: rgba(255, 255, 255, 0.6); margin-bottom: 3px; }
    .stat-value { font-size: 24px; font-weight: 900; color: var(--yellow); }

    .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 8000; display: none; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-box { background: var(--gray); border: 2px solid rgba(239, 251, 0, 0.2); border-radius: 14px; padding: 20px; max-width: 450px; width: 90%; }
    .modal-title { font-size: 18px; font-weight: 900; margin-bottom: 12px; }
    .modal-close { float: right; cursor: pointer; font-size: 20px; }

    @media (max-width: 1200px) {
      .app { grid-template-columns: 1fr; }
      .sidebar, .right-sidebar { display: none; }
    }
  </style>
</head>
<body>

<div class="auth-gate" id="authGate">
  <div class="auth-box">
    <div class="auth-title">NAVIN</div>
    <div class="auth-sub">Track carbon, join community, earn coins!</div>

    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="password" class="auth-input" placeholder="Password">
    <button class="auth-btn" onclick="login()">MASUK</button>
  </div>
</div>

<div class="app" id="app" style="display:none;">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">NAVIN</div>
    <button class="menu-btn active" onclick="show('home')">🏠 Home</button>
    <button class="menu-btn" onclick="show('profile')">👤 Profile</button>
    <button class="menu-btn" onclick="show('friends')">👥 Friends</button>
    <button class="menu-btn" onclick="show('groups')">👨‍👩‍👧‍👦 Groups</button>
    <button class="menu-btn" onclick="logout()" style="background:rgba(255,59,48,.1);color:#FF3B30;border-color:#FF3B30;">🚪 Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="home" class="page active">
      <div style="max-width:600px;margin:0 auto;">
        <div class="post" style="background:rgba(2,102,255,.1);border-color:rgba(2,102,255,.3);text-align:center;">
          <div style="font-size:24px;font-weight:900;margin-bottom:6px;">🌿 Welcome!</div>
          <div style="font-size:12px;opacity:0.7;margin-bottom:12px;">Track carbon, share with friends, earn coins!</div>
          <button class="auth-btn" style="margin:0;width:100%;" onclick="openUpload()">📸 Share Activity</button>
        </div>
        <div id="feed" style="margin-top:16px;"></div>
      </div>
    </div>

    <div id="profile" class="page">
      <div style="max-width:450px;margin:0 auto;">
        <div class="stat-box" style="text-align:left;background:rgba(2,102,255,.1);">
          <div style="font-weight:700;font-size:18px;margin-bottom:4px;" id="pname">—</div>
          <div style="font-size:11px;opacity:0.6;" id="pemail">—</div>
          <div style="font-size:10px;margin-top:6px;color:var(--yellow);" id="plevel">—</div>
        </div>

        <div class="stat-box">
          <div class="stat-label">💰 Coins</div>
          <div class="stat-value" id="pcoins">0</div>
        </div>

        <div class="stat-box">
          <div class="stat-label">💧 Hydration</div>
          <div class="stat-value" id="phydro">0 ml</div>
          <button class="auth-btn" style="margin:8px 0 0 0;padding:8px;" onclick="hydrate()">+ 250ml</button>
        </div>
      </div>
    </div>

    <div id="friends" class="page">
      <div style="max-width:450px;margin:0 auto;">
        <button class="auth-btn" style="width:100%;margin-bottom:12px;" onclick="openAddFriend()">➕ Add Friend</button>
        <div id="flist"></div>
      </div>
    </div>

    <div id="groups" class="page">
      <div style="max-width:450px;margin:0 auto;">
        <button class="auth-btn" style="width:100%;margin-bottom:12px;display:none;" id="createBtn" onclick="openCreateGroup()">➕ Create Group</button>
        <div id="glist"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="right-sidebar">
    <div style="font-size:10px;font-weight:900;color:rgba(255,255,255,.5);margin-bottom:12px;text-transform:uppercase;">⚡ Stats</div>
    <div class="stat-box">
      <div class="stat-label">Total Coins</div>
      <div class="stat-value" id="scoins">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Hydration Today</div>
      <div class="stat-value" id="shydro">0</div>
      <div style="font-size:10px;opacity:0.6;">/ 1000 ml</div>
    </div>
  </div>

</div>

<!-- MODALS -->
<div class="modal" id="uploadModal">
  <div class="modal-box">
    <span class="modal-close" onclick="closeUpload()">×</span>
    <div class="modal-title">📸 Share</div>
    <input type="file" id="photo" accept="image/*" class="auth-input" style="margin-bottom:8px;">
    <textarea id="caption" class="auth-input" placeholder="Caption..." style="height:60px;resize:vertical;"></textarea>
    <button class="auth-btn" onclick="share()">🚀 Share (+20 Coins)</button>
  </div>
</div>

<div class="modal" id="addFriendModal">
  <div class="modal-box">
    <span class="modal-close" onclick="closeFriend()">×</span>
    <div class="modal-title">➕ Add</div>
    <input type="email" id="friendEmail" class="auth-input" placeholder="Email">
    <button class="auth-btn" onclick="addFriend()">Add</button>
  </div>
</div>

<div class="modal" id="createGroupModal">
  <div class="modal-box">
    <span class="modal-close" onclick="closeGroup()">×</span>
    <div class="modal-title">👨‍👩‍👧‍👦 Create</div>
    <input type="text" id="groupName" class="auth-input" placeholder="Group name">
    <button class="auth-btn" onclick="createGroup()">Create</button>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycby-fxrDhMVd0jx6m6UmNnyCIxhSDIiVB6BTW_iENDgcuZ-3svHTgsxKe9vxwwCbjU33OQ/exec';
let user = null;

async function call(body) {
  const url = API + '?payload=' + encodeURIComponent(JSON.stringify(body));
  const r = await fetch(url);
  const t = await r.text();
  try { return JSON.parse(t); } catch(e) { throw new Error('Invalid response'); }
}

async function login() {
  const e = document.getElementById('email').value.trim();
  const p = document.getElementById('password').value.trim();
  if (!e || !p) return alert('Fill fields');

  try {
    const r = await call({ action: 'login', email: e, password: p });
    if (r.success) {
      user = r;
      localStorage.setItem('navin', JSON.stringify(r));
      document.getElementById('authGate').classList.add('hidden');
      document.getElementById('app').style.display = 'grid';
      load();
    } else {
      alert(r.message);
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function logout() {
  localStorage.removeItem('navin');
  location.reload();
}

function show(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById(p).classList.add('active');
  document.querySelectorAll('.menu-btn').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');

  if (p === 'profile') loadProfile();
  if (p === 'friends') loadFriends();
  if (p === 'groups') loadGroups();
  if (p === 'home') loadFeed();
}

async function load() {
  loadFeed();
  loadProfile();
  if (user.level === 'Agent Of Change') {
    document.getElementById('createBtn').style.display = 'block';
  }
}

async function loadFeed() {
  try {
    const r = await call({ action: 'getFeed', token: user.token, userId: user.userId });
    if (r.success) {
      document.getElementById('feed').innerHTML = (r.posts || []).map(p => `
        <div class="post">
          <div class="post-author">${p.name}</div>
          <div class="post-caption">${p.caption}</div>
          <div class="post-actions">
            <button class="post-btn" onclick="like('${p.postId}')">❤️ ${p.likes || 0}</button>
          </div>
        </div>
      `).join('') || '<div style="opacity:0.5;text-align:center;">No posts</div>';
    }
  } catch(e) {}
}

async function loadProfile() {
  try {
    const r = await call({ action: 'getMyProfile', token: user.token, userId: user.userId });
    if (r.success) {
      const p = r.profile;
      document.getElementById('pname').textContent = p.name;
      document.getElementById('pemail').textContent = p.email;
      document.getElementById('plevel').textContent = p.level;
      document.getElementById('pcoins').textContent = p.coins;
      document.getElementById('phydro').textContent = Math.round(p.hydration * 1000) + ' ml';
      document.getElementById('scoins').textContent = p.coins;
      document.getElementById('shydro').textContent = Math.round(p.hydration * 1000);
    }
  } catch(e) {}
}

async function loadFriends() {
  try {
    const r = await call({ action: 'getMyFriends', token: user.token, userId: user.userId });
    if (r.success) {
      document.getElementById('flist').innerHTML = (r.friends || []).map(f => `
        <div class="post">
          <div class="post-author">${f.name}</div>
        </div>
      `).join('') || '<div style="opacity:0.5;">No friends</div>';
    }
  } catch(e) {}
}

async function loadGroups() {
  try {
    const r = await call({ action: 'getGroups', token: user.token, userId: user.userId });
    if (r.success) {
      document.getElementById('glist').innerHTML = (r.groups || []).map(g => `
        <div class="post">
          <div class="post-author">${g.name} ${g.isCreator ? '👑' : ''}</div>
        </div>
      `).join('') || '<div style="opacity:0.5;">No groups</div>';
    }
  } catch(e) {}
}

async function share() {
  const cap = document.getElementById('caption').value.trim();
  const file = document.getElementById('photo').files[0];
  if (!cap) return alert('Add caption');
  if (!file) return alert('Add photo');

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const r = await call({
        action: 'uploadPost',
        token: user.token,
        userId: user.userId,
        email: user.email,
        name: user.name,
        caption: cap,
        photoBase64: e.target.result.substring(0, 1000)
      });
      if (r.success) {
        alert(r.message);
        closeUpload();
        loadFeed();
        loadProfile();
      }
    } catch(e) {
      alert('Error');
    }
  };
  reader.readAsDataURL(file);
}

async function like(id) {
  try {
    const r = await call({ action: 'likePost', token: user.token, userId: user.userId, postId: id });
    if (r.success) {
      loadFeed();
      loadProfile();
    }
  } catch(e) {}
}

async function hydrate() {
  try {
    const r = await call({ action: 'updateHydration', token: user.token, userId: user.userId, amount_ml: 250 });
    if (r.success) {
      alert(r.message);
      loadProfile();
    }
  } catch(e) {}
}

async function addFriend() {
  const e = document.getElementById('friendEmail').value.trim();
  if (!e) return alert('Enter email');
  try {
    const r = await call({ action: 'addFriend', token: user.token, userId: user.userId, friendEmail: e });
    if (r.success) {
      alert(r.message);
      closeFriend();
      loadFriends();
    } else {
      alert(r.message);
    }
  } catch(e) {
    alert('Error');
  }
}

async function createGroup() {
  const n = document.getElementById('groupName').value.trim();
  if (!n) return alert('Enter name');
  try {
    const r = await call({ action: 'createGroup', token: user.token, userId: user.userId, groupName: n });
    if (r.success) {
      alert(r.message);
      closeGroup();
      loadGroups();
    } else {
      alert(r.message);
    }
  } catch(e) {
    alert('Error');
  }
}

function openUpload() { document.getElementById('uploadModal').classList.add('active'); }
function closeUpload() { document.getElementById('uploadModal').classList.remove('active'); }
function openAddFriend() { document.getElementById('addFriendModal').classList.add('active'); }
function closeFriend() { document.getElementById('addFriendModal').classList.remove('active'); }
function openCreateGroup() { document.getElementById('createGroupModal').classList.add('active'); }
function closeGroup() { document.getElementById('createGroupModal').classList.remove('active'); }

window.addEventListener('load', () => {
  const saved = localStorage.getItem('navin');
  if (saved) {
    user = JSON.parse(saved);
    document.getElementById('authGate').classList.add('hidden');
    document.getElementById('app').style.display = 'grid';
    load();
  }
});
</script>

</body>
</html>
